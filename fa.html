<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprost Faucet | Premium PoS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-900/50 backdrop-blur-xl border border-slate-700/50 p-8 rounded-3xl shadow-2xl">
        
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-white mb-2">💧 Aprost Faucet</h2>
            <p class="text-slate-400 text-sm">Jaringan PoS: Dapatkan 1 ARS / 24 Jam</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Wallet Address</label>
                <input type="text" id="address" 
                    placeholder="0x..." 
                    class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all duration-300 font-mono text-sm"
                >
            </div>

            <button id="btn" onclick="claim()" 
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl transition-all duration-300 transform active:scale-95 shadow-lg shadow-blue-900/20">
                Klaim 1 ARS
            </button>
        </div>

        <div id="msg" class="mt-6 p-4 rounded-xl text-sm hidden border border-transparent backdrop-blur-sm animate-in fade-in zoom-in duration-300">
        </div>

        <div class="mt-8 text-center">
            <p class="text-[10px] text-slate-600">Terintegrasi dengan Prysm Validations</p>
        </div>
    </div>

<script>
    // Peringatan: Pindahkan logika ini ke Backend (Node.js/Express) untuk produksi!
    const PK = "PRIVATE_KEY_ANDA_DISINI"; 
    const REWARD = "1.0"; 
    const provider = new ethers.providers.JsonRpcProvider("http://127.0.0.1:8545");
    const wallet = new ethers.Wallet(PK, provider);

    function showMsg(text, type) {
        const msgBox = document.getElementById('msg');
        msgBox.innerHTML = text;
        msgBox.style.display = "block";
        
        // Styling berdasarkan tipe
        if (type === 'success') {
            msgBox.className = "mt-6 p-4 rounded-xl text-sm border bg-emerald-900/20 border-emerald-500/30 text-emerald-400";
        } else {
            msgBox.className = "mt-6 p-4 rounded-xl text-sm border bg-red-900/20 border-red-500/30 text-red-400";
        }
    }

    async function claim() {
        const addr = document.getElementById('address').value.trim();
        const btn = document.getElementById('btn');

        if (!ethers.utils.isAddress(addr)) {
            return showMsg("❌ Alamat tidak valid!", "error");
        }

        const lastClaim = localStorage.getItem('claim_' + addr);
        if (lastClaim && (Date.now() - parseInt(lastClaim) < 86400000)) {
            const sisa = Math.ceil((86400000 - (Date.now() - parseInt(lastClaim))) / 3600000);
            return showMsg(`⏳ Mohon tunggu <b>${sisa} jam</b> lagi.`, "error");
        }

        try {
            btn.disabled = true;
            btn.innerText = "Memproses...";
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            
            const tx = await wallet.sendTransaction({ to: addr, value: ethers.utils.parseEther(REWARD) });
            await tx.wait(); 
            
            localStorage.setItem('claim_' + addr, Date.now());
            showMsg(`✅ Sukses! <br><span class="opacity-70 text-[10px] font-mono">${tx.hash}</span>`, "success");
        } catch (e) {
            showMsg("❌ Terjadi kesalahan pada jaringan.", "error");
        } finally {
            btn.disabled = false;
            btn.innerText = "Klaim 1 ARS";
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }
    }
</script>
</body>
</html>
