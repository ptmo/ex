<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprost Faucet | Premium PoS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background 0.3s; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-white dark:bg-slate-900/50 backdrop-blur-xl border border-slate-200 dark:border-slate-700/50 p-8 sm:p-12 rounded-3xl shadow-2xl transition-all duration-300">
        
        <div class="flex justify-between items-center mb-10">
            <button onclick="toggleTheme()" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition">
                <span id="theme-icon">🌙</span>
            </button>
            <select id="lang-select" onchange="changeLang(this.value)" class="bg-slate-100 dark:bg-slate-800 text-sm p-2 rounded-lg border-none focus:ring-0 outline-none cursor-pointer">
                <option value="en-us">English (US)</option>
                <option value="id">Indonesia</option>
                <option value="ru">Русский</option>
                <option value="zh">中文</option>
                <option value="pt-br">Português (BR)</option>
                <option value="ar">العربية</option>
                <option value="th">ไทย</option>
                <option value="en-au">English (AU)</option>
                <option value="ko">한국어</option>
                <option value="ja">日本語</option>
                <option value="hi">हिन्दी</option>
                <option value="de">Deutsch</option>
                <option value="fr">Français</option>
                <option value="ar-eg">العربية (Egypt)</option>
                <option value="en-ng">English (NG)</option>
                <option value="fil">Filipino</option>
            </select>
        </div>

        <div class="text-center mb-10">
            <h2 id="t-title" class="text-3xl font-bold text-slate-900 dark:text-white mb-2">💧 Aprost Faucet</h2>
            <p id="t-subtitle" class="text-slate-500 dark:text-slate-400">PoS Network: Get 1 ARS / 24 Hours</p>
        </div>

        <div class="space-y-6">
            <div>
                <label id="t-label" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Wallet Address</label>
                <input type="text" id="address" 
                    placeholder="0x..." 
                    class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-4 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all font-mono text-sm"
                >
            </div>

            <button id="btn" onclick="claim()" 
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-4 rounded-xl transition-all duration-300 transform active:scale-95 shadow-lg shadow-blue-500/20">
                Klaim 1 ARS
            </button>
        </div>

        <div id="msg" class="mt-8 p-4 rounded-xl text-sm hidden border"></div>

        <div class="mt-12 text-center">
            <p id="t-footer" class="text-[10px] text-slate-400">Integrated with Prysm Validations</p>
        </div>
    </div>

<script>
    // i18n Data
    const translations = {
        'en-us': { title: '💧 Aprost Faucet', sub: 'PoS Network: Get 1 ARS / 24 Hours', label: 'Wallet Address', btn: 'Claim 1 ARS', footer: 'Integrated with Prysm Validations', invalid: 'Invalid Address!', wait: 'Please wait %h hours.', success: 'Success! TX:', error: 'Network error.' },
        'id': { title: '💧 Aprost Faucet', sub: 'Jaringan PoS: Dapat 1 ARS / 24 Jam', label: 'Alamat Wallet', btn: 'Klaim 1 ARS', footer: 'Terintegrasi dengan Prysm Validations', invalid: 'Alamat tidak valid!', wait: 'Mohon tunggu %h jam lagi.', success: 'Sukses! TX:', error: 'Kesalahan jaringan.' },
        // Tambahkan bahasa lain dengan format yang sama
    };

    function changeLang(lang) {
        const t = translations[lang] || translations['en-us'];
        document.getElementById('t-title').innerText = t.title;
        document.getElementById('t-subtitle').innerText = t.sub;
        document.getElementById('t-label').innerText = t.label;
        document.getElementById('btn').innerText = t.btn;
        document.getElementById('t-footer').innerText = t.footer;
        localStorage.setItem('lang', lang);
    }

    function toggleTheme() {
        document.documentElement.classList.toggle('dark');
        const isDark = document.documentElement.classList.contains('dark');
        document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    // Initialize
    window.onload = () => {
        const savedLang = localStorage.getItem('lang') || 'en-us';
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.getElementById('lang-select').value = savedLang;
        if(savedTheme === 'dark') toggleTheme();
        changeLang(savedLang);
    };

    // Logic Faucet
    const PK = "PRIVATE_KEY_ANDA"; 
    const REWARD = "1.0"; 
    const provider = new ethers.providers.JsonRpcProvider("http://127.0.0.1:8545");
    const wallet = new ethers.Wallet(PK, provider);

    function showMsg(text, type) {
        const msgBox = document.getElementById('msg');
        msgBox.innerHTML = text;
        msgBox.className = `mt-8 p-4 rounded-xl text-sm border animate-in fade-in ${type === 'success' ? 'bg-emerald-50 dark:bg-emerald-900/20 border-emerald-500/30 text-emerald-600' : 'bg-red-50 dark:bg-red-900/20 border-red-500/30 text-red-600'}`;
        msgBox.classList.remove('hidden');
    }

    async function claim() {
        const addr = document.getElementById('address').value.trim();
        if (!ethers.utils.isAddress(addr)) return showMsg(translations[document.getElementById('lang-select').value].invalid, 'error');
        
        // (Logika claim sama seperti sebelumnya...)
        alert("Integrasi backend diperlukan untuk eksekusi.");
    }
</script>
</body>
</html>
