<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprost Faucet | Premium PoS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background 0.3s; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-white dark:bg-slate-900/50 backdrop-blur-xl border border-slate-200 dark:border-slate-700/50 p-8 sm:p-12 rounded-3xl shadow-2xl transition-all duration-300">
        
        <div class="flex justify-between items-center mb-10">
            <button onclick="toggleTheme()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition">
                <span id="theme-icon">🌙</span>
            </button>

            <div class="relative" id="lang-dropdown">
                <button onclick="toggleDropdown()" class="flex items-center gap-3 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-sm px-4 py-2.5 rounded-xl transition font-medium">
                    <img id="current-flag" src="https://flagicons.lipis.dev/flags/4x3/us.svg" class="w-5 h-4 rounded-sm object-cover" alt="flag">
                    <span id="current-lang">English (US)</span>
                    <svg class="w-4 h-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                
                <div id="lang-menu" class="hidden absolute right-0 mt-2 w-56 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-xl overflow-hidden z-50">
                    <div class="max-h-60 overflow-y-auto custom-scrollbar">
                        <ul id="lang-list" class="text-sm divide-y divide-slate-100 dark:divide-slate-700">
                            </ul>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mb-10">
            <h2 id="t-title" class="text-3xl font-bold text-slate-900 dark:text-white mb-2">💧 Aprost Faucet</h2>
            <p id="t-subtitle" class="text-slate-500 dark:text-slate-400">PoS Network: Get 1 ARS / 24 Hours</p>
        </div>

        <div class="space-y-6">
            <div>
                <label id="t-label" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Wallet Address</label>
                <input type="text" id="address" placeholder="0x..." class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-4 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all font-mono text-sm">
            </div>

            <button id="btn" onclick="claim()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-4 rounded-xl transition-all duration-300 transform active:scale-95 shadow-lg shadow-blue-500/20">
                Klaim 1 ARS
            </button>
        </div>

        <div id="msg" class="mt-8 p-4 rounded-xl text-sm hidden border"></div>

        <div class="mt-12 text-center">
            <p id="t-footer" class="text-[10px] text-slate-400">Integrated with Prysm Validations</p>
        </div>
    </div>

<script>
    const languages = [
        { code: 'en-us', name: 'English (US)', flag: 'us' },
        { code: 'en', name: 'English (EN)', flag: 'gb' },
        { code: 'ru', name: 'Русский', flag: 'ru' },
        { code: 'zh', name: '中文', flag: 'cn' },
        { code: 'pt-br', name: 'Português (BR)', flag: 'br' },
        { code: 'ar', name: 'العربية', flag: 'sa' },
        { code: 'th', name: 'ไทย', flag: 'th' },
        { code: 'en-au', name: 'English (AU)', flag: 'au' },
        { code: 'ko', name: '한국어', flag: 'kr' },
        { code: 'ja', name: '日本語', flag: 'jp' },
        { code: 'hi', name: 'हिन्दी', flag: 'in' },
        { code: 'de', name: 'Deutsch', flag: 'de' },
        { code: 'fr', name: 'Français', flag: 'fr' },
        { code: 'ar-eg', name: 'العربية (Egypt)', flag: 'eg' },
        { code: 'en-ng', name: 'English (NG)', flag: 'ng' },
        { code: 'fil', name: 'Filipino', flag: 'ph' },
        { code: 'id', name: 'Indonesia', flag: 'id' }
    ];

    const translations = {
        'en-us': { title: '💧 Aprost Faucet', sub: 'PoS Network: Get 1 ARS / 24 Hours', label: 'Wallet Address', btn: 'Claim 1 ARS', footer: 'Integrated with Prysm Validations', invalid: 'Invalid Address!', success: 'Success! TX:' },
        'id': { title: '💧 Aprost Faucet', sub: 'Jaringan PoS: Dapat 1 ARS / 24 Jam', label: 'Alamat Wallet', btn: 'Klaim 1 ARS', footer: 'Terintegrasi dengan Prysm Validations', invalid: 'Alamat tidak valid!', success: 'Sukses! TX:' }
    };

    // Render List
    const list = document.getElementById('lang-list');
    languages.forEach(lang => {
        const li = document.createElement('li');
        li.className = "flex items-center gap-3 px-4 py-3 hover:bg-slate-50 dark:hover:bg-slate-700 cursor-pointer transition";
        li.innerHTML = `
            <img src="https://flagicons.lipis.dev/flags/4x3/${lang.flag}.svg" class="w-5 h-4 rounded-sm object-cover" alt="${lang.name}">
            <span>${lang.name}</span>
        `;
        li.onclick = () => selectLang(lang);
        list.appendChild(li);
    });

    function toggleDropdown() { document.getElementById('lang-menu').classList.toggle('hidden'); }

    function selectLang(lang) {
        document.getElementById('current-lang').innerText = lang.name;
        document.getElementById('current-flag').src = `https://flagicons.lipis.dev/flags/4x3/${lang.flag}.svg`;
        document.getElementById('lang-menu').classList.add('hidden');
        changeLang(lang.code);
    }

    window.onclick = (e) => {
        if (!document.getElementById('lang-dropdown').contains(e.target)) {
            document.getElementById('lang-menu').classList.add('hidden');
        }
    }

    function changeLang(langCode) {
        const t = translations[langCode] || translations['en-us'];
        document.getElementById('t-title').innerText = t.title;
        document.getElementById('t-subtitle').innerText = t.sub;
        document.getElementById('t-label').innerText = t.label;
        document.getElementById('btn').innerText = t.btn;
        document.getElementById('t-footer').innerText = t.footer;
        localStorage.setItem('lang', langCode);
    }

    function toggleTheme() {
        document.documentElement.classList.toggle('dark');
        const isDark = document.documentElement.classList.contains('dark');
        document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    window.onload = () => {
        const savedLangCode = localStorage.getItem('lang') || 'en-us';
        const langData = languages.find(l => l.code === savedLangCode) || languages[0];
        document.getElementById('current-lang').innerText = langData.name;
        document.getElementById('current-flag').src = `https://flagicons.lipis.dev/flags/4x3/${langData.flag}.svg`;
        changeLang(savedLangCode);
        if(localStorage.getItem('theme') === 'dark') toggleTheme();
    };
</script>
</body>
</html>
